<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Porovnávanie spektier</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        
        <aside class="sidebar">
            <button class="side-analyse-btn"> Spustiť Analýzu </button>

            <div class="side-section">
                <h2> VÝBER DÁT </h2>
                <div class="side-btn-group">
                    <form class="side-upload side-upload-form" action="{{ url_for('main.spectra') }}" method="POST" enctype="multipart/form-data">
                        <label for="file-input"> Nahrať CSV Súbory </label>
                        <input type="file" id="file-input" name="files" hidden onchange="this.form.submit()">
                    </form>

                    <button class="side-upload side-upload-btn"> Použiť Databázu </button>
                </div>
            </div>

            <div class="side-section">
                <h2> VZORKY </h2>
                <div class="spectra-list">
                    {% for file in files %}
                        <p style="color: white;">
                            {{ file.filename }}
                        </p>
                    {% endfor %}
                </div>
            </div>
        </aside>
        
        <main class="content">

        </main>

    </div>
</body>
</html>
