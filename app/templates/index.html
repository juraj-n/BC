<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Porovnávanie spektier</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <div class="app-container">
        
        <aside class="sidebar">
            <button class="side-analyse-btn"> Spustiť Analýzu </button>

            <div class="side-section">
                <h2> VÝBER DÁT </h2>
                <div class="side-btn-group">
                    <form class="side-upload side-upload-form" action="{{ url_for('main.spectra') }}" method="POST" enctype="multipart/form-data">
                        <label for="file-input"> Nahrať CSV Súbory </label>
                        <input type="file" id="file-input" name="files" hidden onchange="this.form.submit()">
                    </form>

                    <button class="side-upload side-upload-btn"> Použiť Databázu </button>
                </div>
            </div>

            <div class="side-section">
                <h2> VZORKY </h2>
                <div class="spectra-list">
                    {% for file_name in file_names %}
                        <p style="color: white;">
                            {{ file_name }}
                        </p>
                    {% endfor %}
                </div>
            </div>
        </aside>
        
        <main class="content">
            <p> {{ x }}</p>
            <p> {{ y }} </p>
            <div class="cont-section">
                <div id="graph"
                    data-x="{{ x | tojson }}"
                    data-y="{{ y | tojson }}">
                </div>
                <script src="{{ url_for('static', filename='js/graph.js') }}"></script>
            </div>
        </main>

    </div>
</body>
</html>
