<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Porovnávanie spektier</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    
    <div class="container">
        
        <aside class="sidebar">
            <h2> VÝBER DÁT </h2>
            <form action="{{ url_for('main.upload') }}" method="POST" enctype="multipart/form-data">
                <label class="csv-upload-btn">
                    Nahrať CSV súbory
                    <input type="file" name="files" accept=".csv" multiple>
                </label>
            </form>

            <h2> VZORKY </h2>
            <ul id="spectra-list">
                {% for file in files %}
                <li> {{ file }} </li>
                {% endfor %}
            </ul>
        </aside>
        
        <main>
            {% block content %}
            {% endblock %}
        </main>

    </div>

</body>
</html>
